<script>
// Load dynamic configuration parameters and state
const defaultSystemSettings = {
    upiId: "7866986738@axl",
    merchantName: "Tech Gadget Zone India",
    advanceAmt: 5000,
    waNumber: "16728972711",
    qrImg: "images/shop.jpg"
};

function getActiveSettings() {
    let settings = localStorage.getItem('tgzi_settings');
    return settings ? JSON.parse(settings) : defaultSystemSettings;
}

document.addEventListener("DOMContentLoaded", () => {
    const settings = getActiveSettings();
    const activeOrderId = localStorage.getItem('tgzi_active_order_id');
    const orders = JSON.parse(localStorage.getItem('tgzi_orders') || '[]');
    
    // Find matching order in local storage
    const currentOrder = orders.find(o => o.id === activeOrderId) || {
        id: "#TGZ102548",
        productModel: "Premium Smartphone",
        advanceAmount: settings.advanceAmt
    };

    // 1. Dynamic Payment Page update
    document.querySelectorAll(".card strong, .payment-row span").forEach(el => {
        if(el.textContent.includes("₹5,000") || el.textContent.includes("₹5000")) {
            el.innerHTML = `₹${parseInt(settings.advanceAmt).toLocaleString('en-IN')}`;
        }
    });

    // Populate order summary data fields
    const paymentRows = document.querySelectorAll(".payment-row");
    if(paymentRows.length >= 3) {
        paymentRows[0].querySelectorAll("span")[1].textContent = `#${currentOrder.id}`;
        paymentRows[1].querySelectorAll("span")[1].textContent = currentOrder.productModel;
        paymentRows[2].querySelectorAll("span")[1].textContent = `₹${parseInt(settings.advanceAmt).toLocaleString('en-IN')}`;
    }

    // Update dynamic QR Code source from settings
    const qrImage = document.querySelector(".qr-box img");
    if (qrImage) {
        qrImage.src = settings.qrImg;
    }

    // 2. Format Mobile Deeplinking intent URLs
    const payBtn = document.querySelector(".pay-btn");
    if (payBtn) {
        const upiIntentString = `upi://pay?pa=${settings.upiId}&pn=${encodeURIComponent(settings.merchantName)}&am=${settings.advanceAmt}&cu=INR`;
        payBtn.href = upiIntentString;
    }

    // Configure support redirect buttons
    const uploadBtn = document.querySelector(".upload-btn");
    if (uploadBtn) {
        const textMessage = encodeURIComponent(`I have completed my advance payment for Order ID #${currentOrder.id}. Sending payment proof verification.`);
        uploadBtn.href = `https://wa.me/${settings.waNumber}?text=${textMessage}`;
    }
});

// Verification count countdown timer
let time = 600;
const countdown = document.getElementById("countdown");
setInterval(function() {
    if (time > 0) {
        time--;
        let min = Math.floor(time / 60);
        let sec = time % 60;
        countdown.innerHTML = String(min).padStart(2, '0') + ":" + String(sec).padStart(2, '0');
    }
}, 1000);
</script>
